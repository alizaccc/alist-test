name: Build Alist Docker
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # 1. 基础环境配置
      - run: go env -w GOPROXY=https://goproxy.cn,direct
      - run: go env -w GOSUMDB=off

      # 2. 强制拉取所有缺失的依赖包
      - run: go get github.com/OpenListTeam/OpenList/v4/drivers/halacloud_open
      - run: go get github.com/RoaringBitmap/roaring/v2@v2.4.5

      # 3. 全量清理+整理依赖，补全go.mod和go.sum
      - run: go clean -modcache
      - run: go mod tidy -x
      - run: go mod verify
      - run: go mod download -x

      # 4. 编译主程序
      - run: CGO_ENABLED=0 go build -ldflags "-s -w" -o alist main.go

      # 5. 登录DockerHub并推送镜像
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: alizaccc/alist-custom:latest
