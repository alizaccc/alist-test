name: Build & Push Alist Docker Image

on:
  push:
    branches: [ 'main' ]

jobs:
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Fix & Download All Dependencies
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GOSUMDB=off
          go env -w GO111MODULE=on
          echo "===== 1. 强制更新所有依赖 ====="
          go get -u -x ./...
          echo "===== 2. 整理并补全所有缺失依赖 ====="
          go mod tidy -x
          echo "===== 3. 验证依赖完整性 ====="
          go mod verify
          echo "===== 4. 下载所有依赖到本地 ====="
          go mod download -x

      - name: Build Alist Binary
        run: |
          CGO_ENABLED=0 go build -ldflags "-s -w" -o alist main.go

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: alizaccc/alist-custom:latest
