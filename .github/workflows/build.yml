name: Build & Push Alist Docker Image

on:
  push:
    branches: [ 'main' ]

jobs:
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 设置Go环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      # 2. 配置稳定环境+全量依赖修复（带完整日志）
      - name: Fix & Download All Dependencies
        run: |
          # 基础环境配置
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GOSUMDB=off
          go env -w GO111MODULE=on

          echo "===== 1. 强制更新所有依赖 ====="
          go get -u -x ./...

          echo "===== 2. 整理并补全所有缺失依赖 ====="
          go mod tidy -x

          echo "===== 3. 验证依赖完整性 ====="
          go mod verify

          echo "===== 4. 下载所有依赖到本地 ====="
          go mod download -x

      # 3. 编译Alist主程序
      - name: Build Alist Binary
        run: |
          CGO_ENABLED=0 go build -ldflags "-s -w" -o alist main.go

      # 4. 登录DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 5. 打包并推送镜像
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: alizaccc/alist-custom:latest
          CGO_ENABLED=0 go build -ldflags "-s -w" -o alist main.go

      # 4. 登录DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 5. 打包Docker镜像并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: alizaccc/alist-custom:latest
