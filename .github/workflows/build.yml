name: Build Alist Docker
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # 基础环境配置
      - run: go env -w GOPROXY=https://goproxy.cn,direct
      - run: go env -w GOSUMDB=off

      # 全量整理依赖，补全所有缺失项
      - run: go clean -modcache
      - run: go mod tidy -e
      - run: go mod download

      # 核心修复：加构建标签跳过有问题的模块，直接编译核心功能
      - run: CGO_ENABLED=0 go build -tags "no_meilisearch no_weiyun" -ldflags "-s -w" -o alist main.go

      # 登录DockerHub并推送镜像
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: alizaccc/alist-custom:latest
