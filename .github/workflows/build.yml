name: Build & Push Alist Docker Image

on:
  push:
    branches: [ 'main' ]

jobs:
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 设置Go环境（和源码要求的版本完全匹配）
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      # 2. 配置Go代理+拉取依赖（打印完整日志，失败直接看哪里出问题）
      - name: Download Go dependencies
        run: |
          go env -w GOPROXY=https://goproxy.io,direct
          go mod download -x

      # 3. 编译Alist主程序
      - name: Build Alist binary
        run: |
          CGO_ENABLED=0 go build -ldflags "-s -w" -o alist main.go

      # 4. 登录DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 5. 打包Docker镜像并推送（只有复制，无任何构建步骤）
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: alizaccc/alist-custom:latest
