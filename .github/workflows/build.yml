name: Build & Push Alist Docker Image

on:
  push:
    branches: [ 'main' ]

jobs:
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 设置Go环境（和源码要求的版本完全匹配）
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      # 2. 更换稳定代理+拉取依赖（解决502报错）
      - name: Download Go dependencies
        run: |
          # 更换为七牛稳定Go代理，解决502网关错误
          go env -w GOPROXY=https://goproxy.cn,direct
          # 关闭sumdb校验，避免部分包校验超时
          go env -w GOSUMDB=off
          # 拉取依赖，打印完整日志
          go mod download -x

      # 3. 编译Alist主程序
      - name: Build Alist binary
        run: |
          CGO_ENABLED=0 go build -ldflags "-s -w" -o alist main.go

      # 4. 登录DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 5. 打包Docker镜像并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: alizaccc/alist-custom:latest
