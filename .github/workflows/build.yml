name: Build & Push Alist Docker Image

on:
  push:
    branches: [ 'main' ]

jobs:
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 设置Go环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      # 2. 配置代理+拉取全量依赖（修复缺失包）
      - name: Fix & Download Go dependencies
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go env -w GOSUMDB=off
          # 手动拉取报错缺失的依赖包
          go get github.com/OpenListTeam/OpenList/v4
          # 自动整理所有依赖，补全go.mod里缺失的包
          go mod tidy
          # 验证所有依赖都拉取成功
          go mod verify

      # 3. 编译Alist主程序
      - name: Build Alist binary
        run: |
          CGO_ENABLED=0 go build -ldflags "-s -w" -o alist main.go

      # 4. 登录DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 5. 打包Docker镜像并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: alizaccc/alist-custom:latest
